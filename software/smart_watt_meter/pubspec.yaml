name: smart_watt_meter
description: "IoT bicycle power measurement app — FRA503 KMUTT"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # BLE
  flutter_blue_plus: ^1.35.3

  # GPS
  geolocator: ^14.0.0
  permission_handler: ^11.4.0

  # Maps
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Firebase
  firebase_core: ^3.13.0
  cloud_firestore: ^5.6.6
  firebase_auth: ^5.5.2

  # Local storage fallback
  shared_preferences: ^2.5.3

  # Utilities
  intl: ^0.20.2
  provider: ^6.1.2
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
